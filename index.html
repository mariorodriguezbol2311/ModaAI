<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRIP STUDIO 2.0 | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --acid: #d4ff00;
            --fire: #ff3d00;
            --white: #f0ebe0;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: var(--white); 
            font-family: 'DM Mono', monospace; 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* UI MOBILE OPTIMIZATION */
        #app {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 60px 1fr 180px; /* Ajuste para móvil */
            height: 100vh;
        }

        @media (min-width: 1024px) {
            #app {
                grid-template-columns: 280px 1fr 320px;
                grid-template-rows: 60px 1fr 40px;
            }
        }

        /* 3D CANVAS */
        #viewport {
            position: relative;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            touch-action: none; /* Crucial para dibujo en móvil */
        }

        #drawCanvas {
            display: none; /* Se usa como textura oculta */
        }

        /* CONTROLES FLOTANTES MÓVIL */
        .mobile-tools {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .tool-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
        }

        .tool-dot.active { border-color: var(--acid); color: var(--acid); }

        /* PANEL IA */
        #aiPanel {
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            font-size: 12px;
        }

        .ai-chat {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
        }

        .msg-bot { border-left: 2px solid var(--acid); padding: 10px; margin-bottom: 10px; background: rgba(212,255,0,0.05); }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 2px; }
        .logo span { color: var(--acid); }

    </style>
</head>
<body>

<header>
    <div class="logo">DRIP<span>.</span>STUDIO</div>
    <div id="status" style="font-size: 10px; opacity: 0.5;">RENDER: PBR_REALTIME</div>
</header>

<div id="app">
    <aside id="leftPanel" style="padding: 20px; border-right: 1px solid var(--border);">
        <p style="font-size: 10px; color: var(--acid); margin-bottom: 15px;">// GEOMETRÍA</p>
        <select id="garmentSelect" style="width:100%; background:#1a1a1a; color:white; padding:10px; border:1px solid var(--border);">
            <option value="tshirt">T-Shirt Oversized</option>
            <option value="hoodie">Heavy Hoodie</option>
        </select>
        
        <div style="margin-top: 20px;">
            <p style="font-size: 10px; color: var(--acid); margin-bottom: 15px;">// COLOR BASE</p>
            <input type="color" id="baseColor" value="#f0ebe0" style="width: 100%; height: 40px; border: none; background: none; cursor: pointer;">
        </div>
    </aside>

    <main id="viewport">
        <div class="mobile-tools">
            <div class="tool-dot active" onclick="setTool('pen')">🖌️</div>
            <div class="tool-dot" onclick="setTool('eraser')">🧼</div>
            <div class="tool-dot" onclick="enhanceDesign()" style="background: var(--acid); color: black;">✨</div>
        </div>
        <canvas id="drawCanvas" width="1024" height="1024"></canvas>
    </main>

    <aside id="aiPanel">
        <div style="padding: 15px; border-bottom: 1px solid var(--border); font-family: 'Syne'; font-weight: 800;">DRIP AI ASSISTANT</div>
        <div class="ai-chat" id="aiChat">
            <div class="msg-bot">Hola. Estoy analizando tu diseño. El color crema actual sugiere una estética "Minimalist Luxury". ¿Quieres que añada detalles de grafiti o texturas de desgaste?</div>
        </div>
        <div style="padding: 10px; display: flex;">
            <input type="text" id="aiInput" placeholder="Pide a la IA mejorar el trazo..." style="flex:1; background:#000; border:1px solid var(--border); color:white; padding:10px;">
        </div>
    </aside>
</div>

<script>
    // --- CONFIGURACIÓN THREE.JS (REALISMO) ---
    let scene, camera, renderer, garment, textureCanvas, ctx;
    let isDrawing = false;

    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(document.getElementById('viewport').clientWidth, document.getElementById('viewport').clientHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('viewport').appendChild(renderer.domElement);

        // Iluminación Profesional (Estudio)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const topLight = new THREE.DirectionalLight(0xffffff, 1);
        topLight.position.set(0, 5, 5);
        scene.add(topLight);

        const rimLight = new THREE.PointLight(0xd4ff00, 0.5);
        rimLight.position.set(-2, -2, 2);
        scene.add(rimLight);

        // Crear Textura Dinámica
        setupDrawingCanvas();

        // Crear Prenda Realista (Simulada con un Box suavizado o esfera para el ejemplo, reemplazable por GLTF)
        const geometry = new THREE.BoxGeometry(1.2, 1.5, 0.5); // Proporción de torso
        const material = new THREE.MeshStandardMaterial({
            color: 0xf0ebe0,
            roughness: 0.7, // Textura de tela (no brilla como plástico)
            metalness: 0.1,
            map: new THREE.CanvasTexture(textureCanvas)
        });

        garment = new THREE.Mesh(geometry, material);
        scene.add(garment);

        animate();
    }

    // --- SISTEMA DE DIBUJO ---
    function setupDrawingCanvas() {
        textureCanvas = document.getElementById('drawCanvas');
        ctx = textureCanvas.getContext('2d');
        ctx.fillStyle = "white"; 
        ctx.fillRect(0, 0, 1024, 1024);
        
        // Eventos para Dibujo Proyectado
        const v = document.getElementById('viewport');
        
        const startDraw = (e) => { isDrawing = true; draw(e); };
        const stopDraw = () => { 
            isDrawing = false; 
            ctx.beginPath(); 
            garment.material.map.needsUpdate = true; 
        };

        v.addEventListener('mousedown', startDraw);
        v.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDraw);
        
        v.addEventListener('touchstart', (e) => { startDraw(e.touches[0]); e.preventDefault(); }, {passive: false});
        v.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); }, {passive: false});
        v.addEventListener('touchend', stopDraw);
    }

    function draw(e) {
        if (!isDrawing) return;
        
        const rect = renderer.domElement.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 1024;
        const y = ((e.clientY - rect.top) / rect.height) * 1024;

        ctx.lineWidth = 15;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#ff3d00";

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
        
        garment.material.map.needsUpdate = true;
    }

    // --- INTERACCIÓN IA ---
    function enhanceDesign() {
        const chat = document.getElementById('aiChat');
        const msg = document.createElement('div');
        msg.className = 'msg-bot';
        msg.innerHTML = "<strong>IA:</strong> He detectado tus trazos. Aplicando <em>Smooth Polish</em> y ajustando la simetría para un look High-Fashion...";
        chat.appendChild(msg);
        chat.scrollTop = chat.scrollHeight;

        // Efecto visual: Aclarar el dibujo suavemente (Simulación de mejora)
        ctx.globalAlpha = 0.1;
        ctx.fillStyle = "white";
        ctx.fillRect(0,0,1024,1024);
        ctx.globalAlpha = 1.0;
        garment.material.map.needsUpdate = true;
    }

    function animate() {
        requestAnimationFrame(animate);
        if(garment) garment.rotation.y += 0.005; // Rotación suave para ver el volumen
        renderer.render(scene, camera);
    }

    // Ajustar tamaño al cambiar ventana (Móvil/Desktop)
    window.addEventListener('resize', () => {
        const w = document.getElementById('viewport').clientWidth;
        const h = document.getElementById('viewport').clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });

    init3D();
</script>
</body>
      </html>
